services:
  app:
    build: .
    container_name: doctor-app
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/doctor-booking
      - JWT_SECRET=secret123
      - PORT=3000

  mongo:
    image: mongo:6
    container_name: doctor-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
